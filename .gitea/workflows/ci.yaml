name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Build release (smoke)
        run: cargo build --release

      - name: Cross-compile Linux x86_64
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Cross-compile Windows x86_64
        run: cargo build --release --target x86_64-pc-windows-gnu
