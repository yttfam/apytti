name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  macos-arm64:
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --release

      - name: Sign and notarize
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: ./sign.sh /Users/cali/Developer/perso/ttyfam/target/release/apytti

      - name: Stage artifact
        run: |
          mkdir -p artifacts
          cp /Users/cali/Developer/perso/ttyfam/target/release/apytti artifacts/apytti-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: apytti-macos-arm64
          path: artifacts/apytti-macos-arm64

  linux-x86_64:
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Build (musl static)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Stage artifact
        run: |
          mkdir -p artifacts
          cp /Users/cali/Developer/perso/ttyfam/target/x86_64-unknown-linux-musl/release/apytti artifacts/apytti-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: apytti-linux-x86_64
          path: artifacts/apytti-linux-x86_64

  windows-x86_64:
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Stage artifact
        run: |
          mkdir -p artifacts
          cp /Users/cali/Developer/perso/ttyfam/target/x86_64-pc-windows-gnu/release/apytti.exe artifacts/apytti-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: apytti-windows-x86_64
          path: artifacts/apytti-windows-x86_64.exe

  release:
    needs: [macos-arm64, linux-x86_64, windows-x86_64]
    runs-on: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Flatten artifacts directory
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -lh release/

      - name: Create Gitea release
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF##*/}"
          REPO_FULL="${GITHUB_REPOSITORY}"
          API="https://git.calii.net/api/v1"

          echo "Creating release $TAG for $REPO_FULL"

          RESPONSE=$(curl -fsS -X POST "$API/repos/$REPO_FULL/releases" \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"body\":\"Automated release for $TAG\",\"draft\":false,\"prerelease\":false}")

          RELEASE_ID=$(echo "$RESPONSE" | python3 -c "import json,sys;print(json.load(sys.stdin)['id'])")
          echo "Release ID: $RELEASE_ID"

          for f in release/*; do
            name=$(basename "$f")
            echo "Uploading $name"
            curl -fsS -X POST "$API/repos/$REPO_FULL/releases/$RELEASE_ID/assets?name=$name" \
              -H "Authorization: token $TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f"
          done

  test:
    runs-on: macos-arm64
    if: "!startsWith(github.ref, 'refs/tags/')"
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: cargo test
