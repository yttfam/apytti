name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-arm64
    steps:
      - name: Checkout
        run: |
          rm -rf src
          TAG="${GITHUB_REF##*/}"
          git clone --branch "$TAG" --depth 1 https://git.calii.net/cali/apytti.git src

      - name: Install cross targets and toolchains
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add x86_64-pc-windows-gnu
          which x86_64-linux-musl-gcc || brew install filosottile/musl-cross/musl-cross
          which x86_64-w64-mingw32-gcc || brew install mingw-w64

      - name: Build macOS arm64
        working-directory: src
        run: cargo build --release

      - name: Sign and notarize macOS binary
        working-directory: src
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: ./sign.sh /Users/cali/Developer/perso/ttyfam/target/release/apytti

      - name: Build, sign, notarize, staple .pkg
        working-directory: src
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: ./build-pkg.sh /Users/cali/Developer/perso/ttyfam/target/release/apytti

      - name: Build Linux x86_64 (musl static)
        working-directory: src
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Build Windows x86_64
        working-directory: src
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Stage release artifacts
        working-directory: src
        run: |
          mkdir -p release
          cp /Users/cali/Developer/perso/ttyfam/target/release/apytti release/apytti-macos-arm64
          cp apytti-*.pkg release/
          cp /Users/cali/Developer/perso/ttyfam/target/x86_64-unknown-linux-musl/release/apytti release/apytti-linux-x86_64
          cp /Users/cali/Developer/perso/ttyfam/target/x86_64-pc-windows-gnu/release/apytti.exe release/apytti-windows-x86_64.exe
          ls -lh release/

      - name: Create Gitea release with binaries
        working-directory: src
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF##*/}"
          REPO_FULL="${GITHUB_REPOSITORY:-cali/apytti}"
          API="https://git.calii.net/api/v1"

          echo "Creating release $TAG for $REPO_FULL"

          BODY=$(printf '{"tag_name":"%s","name":"%s","body":"Automated release","draft":false,"prerelease":false}' "$TAG" "$TAG")
          RESPONSE=$(curl -fsS -X POST "$API/repos/$REPO_FULL/releases" \
            -H "Authorization: token $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          RELEASE_ID=$(echo "$RESPONSE" | python3 -c "import json,sys;print(json.load(sys.stdin)['id'])")
          echo "Release ID: $RELEASE_ID"

          for f in release/*; do
            name=$(basename "$f")
            echo "Uploading $name"
            curl -fsS -X POST "$API/repos/$REPO_FULL/releases/$RELEASE_ID/assets?name=$name" \
              -H "Authorization: token $TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f"
          done
