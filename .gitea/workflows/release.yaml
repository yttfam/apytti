name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-arm64
    steps:
      - name: Checkout
        run: |
          rm -rf src
          TAG="${GITHUB_REF##*/}"
          git clone --branch "$TAG" --depth 1 https://git.calii.net/cali/apytti.git src

      - name: Verify build prerequisites
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl
          for tool in x86_64-linux-musl-gcc codesign productsign pkgbuild xcrun jq; do
            if ! command -v "$tool" >/dev/null; then
              echo "fatal: $tool not found on this runner"
              exit 1
            fi
          done

      - name: Build macOS arm64 release binary
        working-directory: src
        run: cargo build --release

      - name: Wrap in Apytti.app + signed/notarized/stapled .pkg
        working-directory: src
        # build-pkg.sh: wraps target/release/apytti in Apytti.app/Contents/MacOS/,
        # codesigns the bundle with Developer ID Application, builds a pkg that
        # installs the .app to /Applications + symlinks /usr/local/bin/apytti,
        # signs the pkg with Developer ID Installer, then notarizes + staples.
        # All credentials sourced from Vault (secret/infra/apple-{asc,cert-...}).
        run: ./build-pkg.sh target/release/apytti

      - name: Build Linux x86_64 (musl static)
        working-directory: src
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Build Linux aarch64 (musl static)
        working-directory: src
        run: cargo build --release --target aarch64-unknown-linux-musl

      - name: Stage release artifacts
        working-directory: src
        run: |
          mkdir -p release
          # macOS pkg (ships the .app + symlink)
          cp target/apytti-*.pkg release/
          # macOS arm64 raw binary (signed via the Makefile too)
          cp target/release/apytti release/apytti-macos-arm64
          # Linux statics
          cp target/x86_64-unknown-linux-musl/release/apytti release/apytti-linux-x86_64
          cp target/aarch64-unknown-linux-musl/release/apytti release/apytti-linux-aarch64
          # Checksums
          (cd release && shasum -a 256 * > SHA256SUMS)
          ls -lh release/

      - name: Create Gitea release with binaries
        working-directory: src
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_TOKEN:-}" ]]; then
            echo "fatal: RELEASE_TOKEN not set. Add as repo secret in Gitea."
            exit 1
          fi
          TAG="${GITHUB_REF##*/}"
          REPO_FULL="${GITHUB_REPOSITORY:-cali/apytti}"
          API="https://git.calii.net/api/v1"

          echo "Creating release $TAG for $REPO_FULL"

          BODY=$(printf '{"tag_name":"%s","name":"%s","body":"Automated release. macOS .pkg installs Apytti.app to /Applications and symlinks /usr/local/bin/apytti.","draft":false,"prerelease":false}' "$TAG" "$TAG")
          RESPONSE=$(curl -fsS -X POST "$API/repos/$REPO_FULL/releases" \
            -H "Authorization: token $RELEASE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          RELEASE_ID=$(echo "$RESPONSE" | python3 -c "import json,sys;print(json.load(sys.stdin)['id'])")
          echo "Release ID: $RELEASE_ID"

          for f in release/*; do
            name=$(basename "$f")
            echo "Uploading $name"
            curl -fsS -X POST "$API/repos/$REPO_FULL/releases/$RELEASE_ID/assets?name=$name" \
              -H "Authorization: token $RELEASE_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f"
          done
