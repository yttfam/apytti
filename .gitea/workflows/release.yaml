name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    # Pinned to speedwagon: this runner has cali's login keychain (Developer ID
    # Application cert) and Apple notary creds path. Giorno-rs runs as root and
    # has a different keychain, so don't round-robin macOS-arm64 here.
    runs-on: speedwagon
    steps:
      - name: Checkout
        run: |
          rm -rf src
          TAG="${GITHUB_REF##*/}"
          git clone --branch "$TAG" --depth 1 https://git.calii.net/cali/apytti.git src

      - name: Verify build prerequisites
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          if ! command -v rustup >/dev/null; then
            echo "fatal: rustup not installed on this runner."
            exit 1
          fi
          rustup default stable 2>/dev/null || true
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-unknown-linux-musl
          rustup target add x86_64-pc-windows-gnu
          for tool in x86_64-linux-musl-gcc aarch64-linux-musl-gcc x86_64-w64-mingw32-gcc codesign productsign pkgbuild xcrun hdiutil jq zip; do
            if ! command -v "$tool" >/dev/null; then
              echo "fatal: $tool not found on this runner"
              exit 1
            fi
          done
          # Packagers — install on demand (idempotent, cached after first run).
          command -v cargo-deb >/dev/null || cargo install --locked cargo-deb
          command -v cargo-generate-rpm >/dev/null || cargo install --locked cargo-generate-rpm

      - name: Read version from Cargo.toml
        id: ver
        working-directory: src
        run: |
          V=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "VERSION=$V" >> "$GITHUB_ENV"
          echo "Building apytti v$V"

      # ----------------------------------------------------------------------
      # Build all target binaries first. cargo-deb and cargo-generate-rpm
      # are then invoked with --no-build so they just package the existing
      # artifacts — keeps the build graph linear and easy to reason about.
      # ----------------------------------------------------------------------

      - name: Build macOS arm64 release binary
        working-directory: src
        run: cargo build --release

      - name: Cross-compile Linux x86_64 (musl static)
        working-directory: src
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Cross-compile Linux aarch64 (musl static)
        working-directory: src
        run: cargo build --release --target aarch64-unknown-linux-musl

      - name: Cross-compile Windows x86_64 (mingw)
        working-directory: src
        run: cargo build --release --target x86_64-pc-windows-gnu

      # ----------------------------------------------------------------------
      # macOS: .pkg (installer) + .dmg (drag-to-Applications). Both are
      # signed/notarized/stapled via Vault-backed Apple credentials. The .pkg
      # path uses build-pkg.sh (notarizes the .pkg, .app inside inherits the
      # ticket). The .dmg path uses build-dmg.sh which independently
      # notarizes+staples the .app (a DMG ships a standalone .app, so the
      # bundle inside must validate on its own).
      # ----------------------------------------------------------------------

      - name: Wrap in Apytti.app + signed/notarized/stapled .pkg
        working-directory: src
        run: ./build-pkg.sh target/release/apytti

      - name: Build signed/notarized/stapled .dmg with Apytti.app inside
        working-directory: src
        run: ./build-dmg.sh target/release/apytti

      - name: Sign + notarize the raw macOS arm64 binary
        working-directory: src
        run: ./sign.sh target/release/apytti

      # ----------------------------------------------------------------------
      # Linux packages. cargo-deb and cargo-generate-rpm both consume
      # [package.metadata.deb] / [package.metadata.generate-rpm] from
      # Cargo.toml — the asset paths there point at target/release/apytti, so
      # we override with explicit asset paths for each musl target.
      # ----------------------------------------------------------------------

      - name: Build .deb (x86_64)
        working-directory: src
        run: |
          cargo deb --no-build --target x86_64-unknown-linux-musl --no-strip
          ls target/x86_64-unknown-linux-musl/debian/

      - name: Build .deb (aarch64)
        working-directory: src
        run: |
          cargo deb --no-build --target aarch64-unknown-linux-musl --no-strip
          ls target/aarch64-unknown-linux-musl/debian/

      - name: Build .rpm (x86_64)
        working-directory: src
        run: |
          cargo generate-rpm --target x86_64-unknown-linux-musl --payload-compress none --auto-req disabled
          ls target/x86_64-unknown-linux-musl/generate-rpm/

      - name: Build .rpm (aarch64)
        working-directory: src
        run: |
          cargo generate-rpm --target aarch64-unknown-linux-musl --payload-compress none --auto-req disabled
          ls target/aarch64-unknown-linux-musl/generate-rpm/

      # ----------------------------------------------------------------------
      # Portable archives. tar.gz for Linux (each arch), zip for Windows.
      # ----------------------------------------------------------------------

      - name: Build tar.gz archives (Linux)
        working-directory: src
        run: |
          mkdir -p target/tarball
          for triple in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            arch=$(echo "$triple" | cut -d- -f1)
            stage="target/tarball/apytti-${VERSION}-linux-${arch}"
            rm -rf "$stage"
            mkdir -p "$stage"
            cp "target/${triple}/release/apytti" "$stage/apytti"
            cp README.md LICENSE "$stage/"
            (cd target/tarball && tar -czf "apytti-${VERSION}-linux-${arch}.tar.gz" "apytti-${VERSION}-linux-${arch}")
          done
          ls target/tarball/

      - name: Build zip archive (Windows)
        working-directory: src
        run: |
          mkdir -p target/zip
          stage="target/zip/apytti-${VERSION}-windows-x86_64"
          rm -rf "$stage"
          mkdir -p "$stage"
          cp target/x86_64-pc-windows-gnu/release/apytti.exe "$stage/"
          cp README.md LICENSE "$stage/"
          (cd target/zip && zip -r "apytti-${VERSION}-windows-x86_64.zip" "apytti-${VERSION}-windows-x86_64")
          ls target/zip/

      # ----------------------------------------------------------------------
      # Stage all artifacts in one directory + checksums.
      # ----------------------------------------------------------------------

      - name: Stage release artifacts
        working-directory: src
        run: |
          mkdir -p release
          # macOS
          cp target/apytti-${VERSION}.pkg release/
          cp target/apytti-${VERSION}.dmg release/
          cp target/release/apytti release/apytti-${VERSION}-macos-arm64
          # Linux packages
          cp target/x86_64-unknown-linux-musl/debian/*.deb release/
          cp target/aarch64-unknown-linux-musl/debian/*.deb release/
          cp target/x86_64-unknown-linux-musl/generate-rpm/*.rpm release/
          cp target/aarch64-unknown-linux-musl/generate-rpm/*.rpm release/
          # Linux tarballs
          cp target/tarball/*.tar.gz release/
          # Windows
          cp target/zip/*.zip release/
          cp target/x86_64-pc-windows-gnu/release/apytti.exe release/apytti-${VERSION}-windows-x86_64.exe
          # Checksums
          (cd release && shasum -a 256 * > SHA256SUMS)
          ls -lh release/
      - name: Create Gitea release with all artifacts
        working-directory: src
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_TOKEN:-}" ]]; then
            echo "fatal: RELEASE_TOKEN not set. Add as repo secret in Gitea."
            exit 1
          fi
          TAG="${GITHUB_REF##*/}"
          REPO_FULL="${GITHUB_REPOSITORY:-cali/apytti}"
          API="https://git.calii.net/api/v1"

          # Build the release notes via printf so YAML's block-scalar indent
          # rules don't fight with a heredoc.
          NOTES=$(printf '%s\n' \
            "Automated release for ${TAG}." \
            "" \
            "**macOS (Apple Silicon)** — signed, notarized, stapled" \
            "- \`.pkg\` installs Apytti.app to /Applications and symlinks /usr/local/bin/apytti" \
            "- \`.dmg\` ships a standalone Apytti.app to drag into /Applications" \
            "- raw \`apytti-${VERSION}-macos-arm64\` for terminal users" \
            "" \
            "**Linux** — static musl binaries, no runtime deps" \
            "- \`.deb\` for Debian/Ubuntu (x86_64, aarch64)" \
            "- \`.rpm\` for Fedora/RHEL (x86_64, aarch64)" \
            "- \`.tar.gz\` portable for any distro" \
            "" \
            "**Windows** — mingw, no MSVC runtime needed" \
            "- \`.zip\` portable bundle" \
            "- raw \`apytti-${VERSION}-windows-x86_64.exe\`" \
            "" \
            "See SHA256SUMS for integrity." \
            "" \
            "> Reminder: starting 2026-06-15 \`claude -p\` is billed separately from Pro/Max subscriptions. The Claude backend will cost API credits after that date — see README.")

          BODY=$(jq -n --arg tag "$TAG" --arg name "$TAG" --arg body "$NOTES" \
            '{tag_name:$tag, name:$name, body:$body, draft:false, prerelease:false}')

          RESPONSE=$(curl -fsS -X POST "$API/repos/$REPO_FULL/releases" \
            -H "Authorization: token $RELEASE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          RELEASE_ID=$(echo "$RESPONSE" | python3 -c "import json,sys;print(json.load(sys.stdin)['id'])")
          echo "Release ID: $RELEASE_ID"

          for f in release/*; do
            name=$(basename "$f")
            echo "Uploading $name"
            curl -fsS -X POST "$API/repos/$REPO_FULL/releases/$RELEASE_ID/assets?name=$name" \
              -H "Authorization: token $RELEASE_TOKEN" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f"
          done
